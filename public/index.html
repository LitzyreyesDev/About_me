<!DOCTYPE html>

<head>

<title>Litzy's website</title>

<style>
  body {
    margin: 0;
    background: #d6f0f6;

<body>

<svg width="900" height="520" viewBox="0 0 900 520">

  <!-- FILTROS -->
  <defs>
    <!-- Bordes chuecos -->
    <filter id="kidSketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="12"/>
    </filter>

    <!-- Texto escrito a mano -->
    <filter id="handText" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="1.5"/>
    </filter>
  </defs>

  <!-- FONDO -->
  <rect width="900" height="520" fill="#d6f0f6"/>

  <rect x="30" y="20" width="840" height="480"
        rx="30" ry="30"
        fill="none" stroke="#ffb5c0" stroke-width="3"
        filter="url(#kidSketch)"/>

  <line x1="450" y1="40" x2="450" y2="480"
        stroke="#ffb5c0" stroke-width="2"
        filter="url(#kidSketch)"/>
